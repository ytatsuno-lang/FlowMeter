<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>流量測定</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#2E86FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="流量測定">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
</head>
<body>

<!-- ===== Icon sprite (Lucide MIT) ===== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-map-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
      <circle cx="12" cy="10" r="3"/>
    </symbol>
    <symbol id="i-map-pin-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.75 7.09a3 3 0 0 1 2.16 2.16"/>
      <path d="M17.072 17.072c-1.634 2.17-3.527 3.912-4.471 4.727a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 1.432-4.568"/>
      <path d="m2 2 20 20"/>
      <path d="M8.475 2.818A8 8 0 0 1 20 10c0 1.183-.31 2.377-.81 3.533"/>
      <path d="M9.13 9.13a3 3 0 0 0 3.74 3.74"/>
    </symbol>
    <symbol id="i-gauge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 14 4-4"/>
      <path d="M3.34 19a10 10 0 1 1 17.32 0"/>
    </symbol>
    <symbol id="i-droplet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
    </symbol>
    <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </symbol>
    <symbol id="i-pencil-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/>
      <path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.854z"/>
    </symbol>
    <symbol id="i-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </symbol>
    <symbol id="i-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </symbol>
    <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6 6 18"/>
      <path d="m6 6 12 12"/>
    </symbol>
    <symbol id="i-x-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="m15 9-6 6"/>
      <path d="m9 9 6 6"/>
    </symbol>
    <symbol id="i-loader" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2v4"/>
      <path d="m16.2 7.8 2.9-2.9"/>
      <path d="M18 12h4"/>
      <path d="m16.2 16.2 2.9 2.9"/>
      <path d="M12 18v4"/>
      <path d="m4.9 19.1 2.9-2.9"/>
      <path d="M2 12h4"/>
      <path d="m4.9 4.9 2.9 2.9"/>
    </symbol>
  </defs>
</svg>

<main id="app">

  <!-- ===== メーター式タブ ===== -->
  <section id="tab-meter" class="tab-content">
    <div class="location-badge">
      <svg class="icon loc-icon"><use href="#i-map-pin"/></svg>
      <div class="loc-text">
        <div class="loc-line1">位置情報なし</div>
        <div class="loc-line2"></div>
      </div>
      <button class="loc-btn">取得</button>
    </div>

    <div class="section-label">1周あたりの容量</div>
    <div class="segmented">
      <label><input type="radio" name="meter-capacity" value="10"><span>10 L</span></label>
      <label><input type="radio" name="meter-capacity" value="100" checked><span>100 L</span></label>
      <label><input type="radio" name="meter-capacity" value="1000"><span>1000 L</span></label>
    </div>
    <p class="hint" id="meter-capacity-detail"></p>

    <div class="live-display">
      <div class="timer-line"><span id="meter-timer">0.00</span><span class="unit">秒</span></div>
      <div class="flow-line" id="meter-flow">—</div>
    </div>

    <div class="laps">
      <div class="lap-row" id="meter-lap-0"></div>
      <div class="lap-row" id="meter-lap-1"></div>
      <div class="lap-row" id="meter-lap-2"></div>
      <hr>
      <div class="lap-row avg-row hidden" id="meter-avg-row"></div>
    </div>

    <button class="main-btn blue" id="meter-main-btn">
      <span class="main-btn-title" id="meter-main-btn-title">START</span>
      <span class="main-btn-sub" id="meter-main-btn-sub">針が0を通過したらタップ</span>
    </button>

    <div class="bottom-buttons">
      <button class="secondary-btn" id="meter-reset-btn">リセット</button>
      <button class="secondary-btn save-btn" id="meter-save-btn">保存</button>
    </div>
  </section>

  <!-- ===== 水槽式タブ ===== -->
  <section id="tab-tank" class="tab-content hidden">
    <div class="location-badge">
      <svg class="icon loc-icon"><use href="#i-map-pin"/></svg>
      <div class="loc-text">
        <div class="loc-line1">位置情報なし</div>
        <div class="loc-line2"></div>
      </div>
      <button class="loc-btn">取得</button>
    </div>

    <div class="section-label">形状</div>
    <div class="segmented">
      <label><input type="radio" name="tank-shape" value="rectangular" checked><span>矩形</span></label>
      <label><input type="radio" name="tank-shape" value="circular"><span>円形</span></label>
    </div>

    <div class="section-label">寸法 [m]</div>
    <div id="tank-rect-group" class="input-group">
      <div class="field-row">
        <label class="field-label">幅 W</label>
        <input type="number" id="tank-width" inputmode="decimal" step="0.01" min="0">
      </div>
      <div class="field-row">
        <label class="field-label">奥行 D</label>
        <input type="number" id="tank-depth" inputmode="decimal" step="0.01" min="0">
      </div>
    </div>
    <div id="tank-circ-group" class="input-group hidden">
      <div class="field-row">
        <label class="field-label">直径 Φ</label>
        <input type="number" id="tank-diameter" inputmode="decimal" step="0.01" min="0">
      </div>
    </div>

    <div class="section-label">水位差 Δh [m]</div>
    <div class="field-row">
      <label class="field-label">Δh</label>
      <input type="number" id="tank-level-delta" inputmode="decimal" step="0.01" min="0">
    </div>

    <div class="prediction-box">
      <div>
        <div class="dim small">断面積</div>
        <div class="num" id="tank-cross-section">—</div>
      </div>
      <div class="right">
        <div class="dim small">体積変化（Δh分）</div>
        <div class="num" id="tank-volume">—</div>
      </div>
    </div>

    <div class="live-display">
      <div class="timer-line"><span id="tank-timer">0.00</span><span class="unit">秒</span></div>
      <div class="flow-line" id="tank-flow">—</div>
    </div>

    <button class="main-btn blue" id="tank-main-btn">
      <span class="main-btn-title" id="tank-main-btn-title">START</span>
      <span class="main-btn-sub" id="tank-main-btn-sub">水位の基準を読んだらタップ</span>
    </button>

    <div class="bottom-buttons">
      <button class="secondary-btn" id="tank-reset-btn">リセット</button>
      <button class="secondary-btn save-btn" id="tank-save-btn">保存</button>
    </div>
  </section>

  <!-- ===== 履歴タブ ===== -->
  <section id="tab-history" class="tab-content hidden">
    <div class="history-toolbar">
      <h1>計測履歴</h1>
      <div class="toolbar-actions">
        <button id="history-export-btn" class="small"><svg class="icon"><use href="#i-download"/></svg>エクスポート</button>
        <button id="history-import-btn" class="small"><svg class="icon"><use href="#i-upload"/></svg>インポート</button>
        <input type="file" id="history-import-input" accept="application/json" hidden>
      </div>
    </div>
    <div id="history-empty" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <p>履歴はまだありません</p>
    </div>
    <div id="history-list" class="history-list"></div>
  </section>

</main>

<!-- ===== TabBar ===== -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="meter">
    <svg class="icon tab-icon"><use href="#i-gauge"/></svg>
    <span class="tab-label">メーター</span>
  </button>
  <button class="tab-btn" data-tab="tank">
    <svg class="icon tab-icon"><use href="#i-droplet"/></svg>
    <span class="tab-label">水槽</span>
  </button>
  <button class="tab-btn" data-tab="history">
    <svg class="icon tab-icon"><use href="#i-clock"/></svg>
    <span class="tab-label">履歴</span>
  </button>
</nav>

<!-- ===== Save Sheet (modal) ===== -->
<dialog id="save-dialog" class="sheet">
  <div id="save-body"></div>
</dialog>

<!-- ===== Detail Sheet (modal) ===== -->
<dialog id="detail-dialog" class="sheet">
  <div id="detail-body"></div>
  <button id="detail-close" class="sheet-close">閉じる</button>
</dialog>

<script type="module" src="./js/app.js"></script>
</body>
</html>
